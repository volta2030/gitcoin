name: Update Ledger and Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'utxo/**'
      - 'validators/**'
      - 'docs/index.html'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate ledger snapshot
        run: python3 .github/scripts/update_ledger.py

      - name: Inject repository name into explorer
        run: |
          sed -i "s|__REPO__|${{ github.repository }}|g" docs/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
