name: Consensus Check

on:
  issue_comment:
    types: [created, deleted]

permissions:
  statuses: write
  pull-requests: read
  issues: read

jobs:
  check:
    runs-on: ubuntu-latest
    # Only run for comments on PRs
    if: github.event.issue.pull_request != null
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Count validator approvals and update status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          python3 - << 'EOF'
          import json, subprocess, os, sys, re, math
          from datetime import datetime, timezone

          repo = "${{ github.repository }}"
          pr_number = os.environ['PR_NUMBER']
          comment_body = os.environ.get('COMMENT_BODY', '').strip()
          event_action = os.environ.get('EVENT_ACTION', '')

          # On creation, only proceed if comment is /approve
          if event_action == 'created' and comment_body != '/approve':
              print("Not an /approve comment, skipping")
              sys.exit(0)

          # Verify PR is still open
          r = subprocess.run(
              ['gh', 'api', f'repos/{repo}/issues/{pr_number}'],
              capture_output=True, text=True, env=os.environ
          )
          if r.returncode != 0:
              sys.exit(1)
          if json.loads(r.stdout).get('state') != 'open':
              print("PR is closed, skipping")
              sys.exit(0)

          # Get PR head SHA and body
          r = subprocess.run(
              ['gh', 'api', f'repos/{repo}/pulls/{pr_number}'],
              capture_output=True, text=True, env=os.environ
          )
          if r.returncode != 0:
              sys.exit(1)
          pr_data = json.loads(r.stdout)
          head_sha = pr_data['head']['sha']
          pr_body = pr_data.get('body', '') or ''

          def post_status(state, description):
              subprocess.run([
                  'gh', 'api', f'repos/{repo}/statuses/{head_sha}',
                  '-f', f'state={state}',
                  '-f', 'context=consensus-check/passed',
                  '-f', f'description={description[:140]}'
              ], env=os.environ)

          # Get valid validators from pubkeys.json
          valid_validators = set()
          pubkeys_path = 'validators/pubkeys.json'
          if os.path.exists(pubkeys_path):
              with open(pubkeys_path) as f:
                  pubkeys = json.load(f)
              valid_validators = set(pubkeys.keys())

          # Get all PR comments
          r = subprocess.run(
              ['gh', 'api', f'repos/{repo}/issues/{pr_number}/comments', '--paginate'],
              capture_output=True, text=True, env=os.environ
          )
          if r.returncode != 0:
              post_status('error', 'Failed to fetch PR comments')
              sys.exit(1)
          comments = json.loads(r.stdout)

          # Detect PR type
          is_tx_transfer = bool(re.search(r'^TX_VERSION:\s*1\s*$', pr_body, re.MULTILINE))

          if is_tx_transfer:
              # TX transfer: only the sender (FROM) can approve their own TX
              m = re.search(r'^FROM:\s*(\S+)', pr_body, re.MULTILINE)
              from_user = m.group(1).strip() if m else ''
              if not from_user:
                  post_status('error', 'Could not determine FROM field in TX body')
                  sys.exit(0)
              approved = any(
                  c.get('user', {}).get('login', '') == from_user and c.get('body', '').strip() == '/approve'
                  for c in comments
              )
              print(f"TX sender approval: {'yes' if approved else 'no'} (waiting for @{from_user})")
              if approved:
                  post_status('success', f'TX approved by sender @{from_user}')
              else:
                  post_status('pending', f'Waiting for sender @{from_user} to post /approve')
          else:
              # Non-TX (code changes, REGISTER_KEY): require ceil(1/3) of all validators
              total = len(valid_validators)
              required = math.ceil(total / 3) if total else 1
              approvals = set()
              for c in comments:
                  user = c.get('user', {}).get('login', '')
                  body = c.get('body', '').strip()
                  if body == '/approve' and user in valid_validators:
                      approvals.add(user)
              approval_count = len(approvals)
              print(f"Non-TX approvals: {approval_count}/{required} required (by: {sorted(approvals)})")
              if approval_count >= required:
                  post_status('success', f'Approved: {approval_count}/{total} validators ({required} required)')
              else:
                  post_status('pending', f'Waiting for consensus: {approval_count}/{required} validator approvals needed')
          EOF
