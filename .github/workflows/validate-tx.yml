name: Validate Transaction

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check PR type
        id: is_tx
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -q "TX_VERSION: REGISTER_KEY"; then
            echo "is_tx=true" >> $GITHUB_OUTPUT
            echo "is_register=true" >> $GITHUB_OUTPUT
          elif echo "$PR_BODY" | grep -q "TX_VERSION"; then
            echo "is_tx=true" >> $GITHUB_OUTPUT
            echo "is_register=false" >> $GITHUB_OUTPUT
          else
            echo "is_tx=false" >> $GITHUB_OUTPUT
            echo "is_register=false" >> $GITHUB_OUTPUT
          fi

      - name: Post success status for non-TX PRs (code/docs changes)
        if: steps.is_tx.outputs.is_tx == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=success \
            -f context="validate-tx/validate" \
            -f description="Not a transaction PR, skipping validation"
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=pending \
            -f context="consensus-check/passed" \
            -f description="Waiting for 1/3 validator approval"
          python3 - << 'EOF'
          import json, math, subprocess, os
          pubkeys_path = 'validators/pubkeys.json'
          pubkeys = {}
          if os.path.exists(pubkeys_path):
              with open(pubkeys_path) as f:
                  pubkeys = json.load(f)
          validators = list(pubkeys.keys())
          required = math.ceil(len(validators) / 3) if validators else 1
          mentions = ' '.join(f"@{v}" for v in validators)
          pr_number = "${{ github.event.pull_request.number }}"
          comment = (
              f"## Code Review Required\n\n"
              f"{mentions}\n\n"
              f"This PR contains non-transaction changes and requires validator approval before merging.\n\n"
              f"To approve, post:\n```\n/approve\n```\n\n"
              f"**Required**: {required} of {len(validators)} validators must approve."
          )
          subprocess.run(
              ['gh', 'pr', 'comment', pr_number, '--body', comment],
              env=os.environ
          )
          EOF

      - name: Post validate success + consensus pending for REGISTER_KEY PRs
        if: steps.is_tx.outputs.is_register == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=success \
            -f context="validate-tx/validate" \
            -f description="REGISTER_KEY PR format valid"
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=pending \
            -f context="consensus-check/passed" \
            -f description="Waiting for 1/3 validator approval"
          python3 - << 'EOF'
          import json, math, subprocess, os
          pubkeys_path = 'validators/pubkeys.json'
          pubkeys = {}
          if os.path.exists(pubkeys_path):
              with open(pubkeys_path) as f:
                  pubkeys = json.load(f)
          validators = list(pubkeys.keys())
          required = math.ceil(len(validators) / 3) if validators else 1
          mentions = ' '.join(f"@{v}" for v in validators)
          pr_number = "${{ github.event.pull_request.number }}"
          comment = (
              f"## Key Registration Review Required\n\n"
              f"{mentions}\n\n"
              f"A new public key registration is pending. Review and approve with:\n```\n/approve\n```\n\n"
              f"**Required**: {required} of {len(validators)} validators must approve."
          )
          subprocess.run(
              ['gh', 'pr', 'comment', pr_number, '--body', comment],
              env=os.environ
          )
          EOF

      - name: Set initial pending status for TX PRs
        if: steps.is_tx.outputs.is_tx == 'true' && steps.is_tx.outputs.is_register != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
            -f state=pending \
            -f context="validate-tx/validate" \
            -f description="Validating transaction..."
          gh api "repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
            -f state=pending \
            -f context="consensus-check/passed" \
            -f description="Waiting for transaction validation to complete"

      - name: Install Python dependencies
        if: steps.is_tx.outputs.is_tx == 'true'
        run: pip install cryptography --quiet

      - name: Fetch PR changed files
        if: steps.is_tx.outputs.is_tx == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            > /tmp/pr_files.json

      - name: Fetch PR head file contents
        if: steps.is_tx.outputs.is_tx == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json, subprocess, base64, os

          with open('/tmp/pr_files.json') as f:
              files = json.load(f)

          head_sha = "${{ github.event.pull_request.head.sha }}"
          repo = "${{ github.repository }}"
          fetched = {}

          for fi in files:
              # Fetch added utxo files and modified validators/pubkeys.json
              should_fetch = (
                  (fi['status'] == 'added' and fi['filename'].startswith('utxo/')) or
                  (fi['status'] == 'modified' and fi['filename'] == 'validators/pubkeys.json')
              )
              if not should_fetch:
                  continue
              r = subprocess.run(
                  ['gh', 'api', f"repos/{repo}/contents/{fi['filename']}?ref={head_sha}"],
                  capture_output=True, text=True, env=os.environ
              )
              if r.returncode == 0:
                  data = json.loads(r.stdout)
                  content = base64.b64decode(data['content'].replace('\n', '')).decode()
                  fetched[fi['filename']] = content

          with open('/tmp/pr_head_content.json', 'w') as f:
              json.dump(fetched, f)
          EOF

      - name: Run transaction validation
        if: steps.is_tx.outputs.is_tx == 'true'
        id: validate
        continue-on-error: true
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python3 .github/scripts/validate_tx.py \
            /tmp/pr_files.json \
            /tmp/pr_head_content.json \
            2>&1 | tee /tmp/result.txt
          exit ${PIPESTATUS[0]}

      - name: Post success status and request sender approval
        if: steps.validate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
            -f state=success \
            -f context="validate-tx/validate" \
            -f description="Transaction is valid"
          gh api "repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
            -f state=pending \
            -f context="consensus-check/passed" \
            -f description="Waiting for sender @${PR_AUTHOR} to post /approve"
          gh pr edit "${PR_NUMBER}" --add-label "tx-valid" 2>/dev/null || true
          gh pr edit "${PR_NUMBER}" --remove-label "tx-invalid" 2>/dev/null || true
          COMMENT_BODY="## Transaction Valid

@${PR_AUTHOR} — Your transaction has been validated successfully.

To confirm and approve this PR for merging, post:
\`\`\`
/approve
\`\`\`

No external validators are required — only your explicit approval is needed."
          gh pr comment "${PR_NUMBER}" --body "${COMMENT_BODY}"

      - name: Post failure status
        if: steps.is_tx.outputs.is_tx == 'true' && steps.is_tx.outputs.is_register != 'true' && steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REASON=$(head -1 /tmp/result.txt | cut -c1-140)
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=failure \
            -f context="validate-tx/validate" \
            -f "description=${REASON}"
          gh pr edit ${{ github.event.pull_request.number }} --add-label "tx-invalid" 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "tx-valid" 2>/dev/null || true
          BODY=$(printf '❌ **Transaction validation failed:**\n\n```\n%s\n```' "$(cat /tmp/result.txt)")
          gh pr comment ${{ github.event.pull_request.number }} --body "${BODY}"

      - name: Post error status on unexpected failure
        if: steps.is_tx.outputs.is_tx == 'true' && steps.is_tx.outputs.is_register != 'true' && steps.validate.outcome == '' && failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
            -f state=error \
            -f context="validate-tx/validate" \
            -f description="Workflow error — check Actions logs"
