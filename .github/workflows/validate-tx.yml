name: Validate Transaction

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check PR type
        id: is_tx
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -q "TX_VERSION: REGISTER_KEY"; then
            echo "is_tx=true" >> $GITHUB_OUTPUT
            echo "is_register=true" >> $GITHUB_OUTPUT
          elif echo "$PR_BODY" | grep -q "TX_VERSION"; then
            echo "is_tx=true" >> $GITHUB_OUTPUT
            echo "is_register=false" >> $GITHUB_OUTPUT
          else
            echo "is_tx=false" >> $GITHUB_OUTPUT
            echo "is_register=false" >> $GITHUB_OUTPUT
          fi

      - name: Post success status for non-TX PRs (code/docs changes)
        if: steps.is_tx.outputs.is_tx == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=success \
            -f context="validate-tx/validate" \
            -f description="Not a transaction PR, skipping validation"
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=success \
            -f context="consensus-check/passed" \
            -f description="Not a transaction PR, consensus not required"

      - name: Post validate success + consensus pending for REGISTER_KEY PRs
        if: steps.is_tx.outputs.is_register == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=success \
            -f context="validate-tx/validate" \
            -f description="REGISTER_KEY PR format valid"
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=pending \
            -f context="consensus-check/passed" \
            -f description="Waiting for 1 validator /approve to register key"

      - name: Install Python dependencies
        if: steps.is_tx.outputs.is_tx == 'true'
        run: pip install cryptography --quiet

      - name: Fetch PR changed files
        if: steps.is_tx.outputs.is_tx == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            > /tmp/pr_files.json

      - name: Fetch PR head file contents
        if: steps.is_tx.outputs.is_tx == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json, subprocess, base64, os

          with open('/tmp/pr_files.json') as f:
              files = json.load(f)

          head_sha = "${{ github.event.pull_request.head.sha }}"
          repo = "${{ github.repository }}"
          fetched = {}

          for fi in files:
              # Fetch added utxo files and modified validators/pubkeys.json
              should_fetch = (
                  (fi['status'] == 'added' and fi['filename'].startswith('utxo/')) or
                  (fi['status'] == 'modified' and fi['filename'] == 'validators/pubkeys.json')
              )
              if not should_fetch:
                  continue
              r = subprocess.run(
                  ['gh', 'api', f"repos/{repo}/contents/{fi['filename']}?ref={head_sha}"],
                  capture_output=True, text=True, env=os.environ
              )
              if r.returncode == 0:
                  data = json.loads(r.stdout)
                  content = base64.b64decode(data['content'].replace('\n', '')).decode()
                  fetched[fi['filename']] = content

          with open('/tmp/pr_head_content.json', 'w') as f:
              json.dump(fetched, f)
          EOF

      - name: Run transaction validation
        if: steps.is_tx.outputs.is_tx == 'true'
        id: validate
        continue-on-error: true
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python3 .github/scripts/validate_tx.py \
            /tmp/pr_files.json \
            /tmp/pr_head_content.json \
            2>&1 | tee /tmp/result.txt
          exit ${PIPESTATUS[0]}

      - name: Post success status and assign validators
        if: steps.validate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
            -f state=success \
            -f context="validate-tx/validate" \
            -f description="Transaction is valid"
          gh pr edit "${PR_NUMBER}" --add-label "tx-valid" 2>/dev/null || true
          gh pr edit "${PR_NUMBER}" --remove-label "tx-invalid" 2>/dev/null || true

          python3 - << 'EOF'
          import json, random, math, subprocess, os, sys
          from datetime import datetime, timezone, timedelta

          # Load pubkeys.json as validator pool
          pubkeys_path = 'validators/pubkeys.json'
          pubkeys = {}
          if os.path.exists(pubkeys_path):
              with open(pubkeys_path) as f:
                  pubkeys = json.load(f)

          # Load registry for scoring metadata (optional)
          registry_map = {}
          registry_path = 'validators/registry.json'
          if os.path.exists(registry_path):
              with open(registry_path) as f:
                  reg = json.load(f)
              for v in reg.get('validators', []):
                  registry_map[v['username']] = v

          now = datetime.now(timezone.utc)
          active = []
          for username in pubkeys:
              reg_entry = registry_map.get(username, {})
              score = reg_entry.get('score', 100)
              last_active_str = reg_entry.get('last_active', '')
              if last_active_str:
                  try:
                      last_active = datetime.fromisoformat(last_active_str.replace('Z', '+00:00'))
                      weeks_inactive = max(0, (now - last_active).days // 7)
                      score -= weeks_inactive * 10
                  except ValueError:
                      pass
              if score >= 0:
                  active.append({'username': username})

          if not active:
              print("ERROR: No validators found in pubkeys.json", file=sys.stderr)
              sys.exit(1)

          rng = random.Random(int(os.environ['RUN_ID']))
          selected_count = min(7, len(active))
          selected = rng.sample(active, selected_count)
          required = math.ceil(selected_count * 2 / 3)
          usernames = [v['username'] for v in selected]
          mentions = ' '.join(f"@{u}" for u in usernames)
          deadline = (now + timedelta(hours=48)).strftime('%Y-%m-%d %H:%M UTC')

          comment = (
              f"## Validator Vote Requested\n\n"
              f"{mentions}\n\n"
              f"You have been selected to validate this transaction. "
              f"To cast your vote, post the following comment on this PR:\n\n"
              f"```\n/approve\n```\n\n"
              f"**Consensus required**: {required} of {selected_count} selected validators\n"
              f"**Deadline**: {deadline}\n\n"
              f"If {required} approvals are not received by the deadline, "
              f"this transaction will be automatically expired.\n\n"
              f"---\n"
              f"<!-- GITCOIN_VALIDATORS:{','.join(usernames)} -->\n"
              f"<!-- GITCOIN_REQUIRED:{required} -->"
          )

          r = subprocess.run(
              ['gh', 'pr', 'comment', os.environ['PR_NUMBER'], '--body', comment],
              capture_output=True, text=True, env=os.environ
          )
          if r.returncode != 0:
              print(f"ERROR: Failed to post comment: {r.stderr}", file=sys.stderr)
              sys.exit(1)

          print(f"Assigned {selected_count} validators, {required} approvals required: {', '.join(usernames)}")
          EOF

      - name: Post failure status
        if: steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REASON=$(head -1 /tmp/result.txt | cut -c1-140)
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=failure \
            -f context="validate-tx/validate" \
            -f "description=${REASON}"
          gh pr edit ${{ github.event.pull_request.number }} --add-label "tx-invalid" 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "tx-valid" 2>/dev/null || true
          BODY=$(printf '❌ **Transaction validation failed:**\n\n```\n%s\n```' "$(cat /tmp/result.txt)")
          gh pr comment ${{ github.event.pull_request.number }} --body "${BODY}"
